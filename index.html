<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Bambino Pizza - Cocina</title>
<link rel="manifest" href="manifest.json">

<style>
html, body {
  touch-action: manipulation;
  -ms-touch-action: manipulation;
  overscroll-behavior: contain;
}

body{
  font-family: Arial;
  font-size: 20px;
  padding: 30px;
  text-align: center;
}

.logo{
  width: 200px;
  display: block;
  margin: auto;
  margin-bottom: 15px;
}

h2{
  margin-bottom: 5px;
}

.date{
  font-size: 18px;
  color: #666;
  margin-bottom: 20px;
}

.drop-section{
  margin-bottom: 30px;
  max-width: 650px;
  margin-left: auto;
  margin-right: auto;
}

.drop-label{
  font-size: 22px;
  font-weight: 600;
  margin-right: 15px;
}

.drop-select{
  font-size: 22px;
  padding: 8px 15px;
  border-radius: 5px;
  border: 2px solid #ccc;
}

.row{
  display: grid;
  grid-template-columns: auto 60px 90px 60px;
  align-items: center;
  gap: 14px;
  margin-bottom: 24px;
  max-width: 650px;
  margin-left: auto;
  margin-right: auto;
}

.ingredientBox{
  text-align: left;
}

.ingredient{
  font-weight: 600;
}

input{
  width: 70px;
  font-size: 22px;
  text-align: center;
}

input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button{
  -webkit-appearance: none;
  margin: 0;
}

input[type=number]{
  -moz-appearance: textfield;
}

button{
  font-size: 22px;
  padding: 8px 16px;
}

#submitBtn{
  font-size: 26px;
  padding: 14px 40px;
  margin-top: 25px;
  display: block;
  margin: auto;
}

#resetBtn {
  font-size: 20px;
  padding: 10px 26px;
  display: block;
  margin: 20px auto;
  display: none;
}

.note{
  margin-top: 18px;
  font-size: 18px;
  color: #444;
}

.last-submit{
  margin-top: 20px;
  font-size: 16px;
  color: #666;
}
</style>
</head>

<body>

<img src="icon.png" class="logo">

<h2>🍕 Cocina - Drops</h2>

<div id="todayDate" class="date"></div>

<div class="drop-section">
  <label class="drop-label">Drop #:</label>
  <select id="dropNumber" class="drop-select">
    <option value="1">Drop 1</option>
    <option value="2">Drop 2</option>
    <option value="3">Drop 3</option>
    <option value="4">Drop 4</option>
    <option value="5">Drop 5</option>
  </select>
</div>

<div id="lastSubmit" class="last-submit"></div>

<button id="resetBtn" onclick="newForm()">NUEVO DROP</button>

<div id="form"></div>

<button id="submitBtn" onclick="submitDrop()">ENVIAR DROP</button>

<div class="note">
⚠️ Verifica que todo esté correcto antes de enviar
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwAsjdtQi-Z4SekT-bJIHJPSxkzPVtulT5PmT6BHc2nGS68EFXaG5l5UGsqk8mgD3sr/exec";

function setDate(){
  const today = new Date();
  const options = { weekday:'long', day:'numeric', month:'long' };
  document.getElementById("todayDate").innerText = today.toLocaleDateString('en-GB', options);
}

async function loadIngredients(){
  const res = await fetch(`${SCRIPT_URL}?action=getPizzas`);
  const data = await res.json();
  showForm(data);
}

function showForm(data){
  const container = document.getElementById("form");
  container.innerHTML = "";
  
  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "row";
    
    div.innerHTML = `
      <div class="ingredientBox">
        <div class="ingredient">${item}</div>
      </div>
      <button onclick="change('${item}', -1)">-</button>
      <input 
        type="number"
        id="${item}"
        min="0"
        inputmode="numeric"
        pattern="[0-9]*"
        value="0"
        onkeydown="moveNext(event)"
      >
      <button onclick="change('${item}', 1)">+</button>
    `;
    
    container.appendChild(div);
  });
  
  const firstInput = document.querySelector("input");
  if(firstInput) firstInput.focus();
}

function change(id, val){
  const input = document.getElementById(id);
  let current = Number(input.value) || 0;
  current += val;
  if(current < 0) current = 0;
  input.value = current;
}

function moveNext(event){
  if(event.key === "Enter"){
    event.preventDefault();
    const inputs = Array.from(document.querySelectorAll("input"));
    const index = inputs.indexOf(event.target);
    if(index > -1 && index < inputs.length - 1){
      inputs[index + 1].focus();
    }
  }
}

async function submitDrop(){
  const dropNumber = document.getElementById("dropNumber").value;
  const inputs = document.querySelectorAll("input");
  const data = [];
  
  inputs.forEach(i => {
    data.push({ 
      pizza: i.id, 
      quantity: Number(i.value) || 0 
    });
  });
  
  // Verificar si al menos una pizza tiene cantidad > 0
  const hasQuantity = data.some(item => item.quantity > 0);
  if(!hasQuantity){
    alert("⚠️ Debes ingresar al menos una pizza con cantidad mayor a 0");
    return;
  }
  
  const confirmSubmit = confirm(`¿Confirmas el Drop #${dropNumber}?`);
  if(!confirmSubmit) return;
  
  const payload = {
    dropNumber: dropNumber,
    pizzas: data
  };
  
  try {
    const res = await fetch(`${SCRIPT_URL}?action=submitDrop&data=${encodeURIComponent(JSON.stringify(payload))}`);
    const result = await res.json();
    
    if(result.status === "ok"){
      showSuccess();
    } else {
      alert("Error al guardar. Intenta nuevamente.");
    }
  } catch(error) {
    alert("Error de conexión: " + error);
  }
}

function showSuccess(){
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("resetBtn").style.display = "block";
  
  const now = new Date();
  const options = { 
    weekday:'long', 
    day:'numeric', 
    month:'long', 
    hour:'2-digit', 
    minute:'2-digit' 
  };
  
  const dropNumber = document.getElementById("dropNumber").value;
  document.getElementById("lastSubmit").innerHTML = 
    `✅ Drop #${dropNumber} registrado: ${now.toLocaleDateString('en-GB', options)}`;
  
  // Deshabilitar inputs
  const inputs = document.querySelectorAll("input");
  inputs.forEach(i => i.disabled = true);
  
  // Deshabilitar select
  document.getElementById("dropNumber").disabled = true;
}

function newForm(){
  document.getElementById("submitBtn").style.display = "block";
  document.getElementById("resetBtn").style.display = "none";
  document.getElementById("lastSubmit").innerHTML = "";
  
  // Habilitar select
  document.getElementById("dropNumber").disabled = false;
  
  // Limpiar y habilitar inputs
  const inputs = document.querySelectorAll("input");
  inputs.forEach(i => {
    i.disabled = false;
    i.value = "0";
  });
  
  const firstInput = document.querySelector("input");
  if(firstInput) firstInput.focus();
}

setDate();
loadIngredients();
</script>

</body>
</html>
